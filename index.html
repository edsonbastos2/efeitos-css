<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite Aryella - 1 Aninho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        /* Bloqueio total de scroll para experiência de App */
        html, body {
            width: 100%;
            height: 100dvh; /* dvh = dynamic view height, melhor para browsers mobile */
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            background: linear-gradient(180deg, #a7ffeb 0%, #fce4ec 100%);
            display: flex;
            justify-content: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Remove o brilho azul ao tocar no mobile */
        }

        /* Container principal adaptável */
        .mobile-canvas {
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Distribui o conteúdo verticalmente */
            padding: 20px 0;
            z-index: 10;
        }

        /* Animação Mergulhadora (Correção de scroll horizontal) */
        .diver-area {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 40;
        }

        .diver-girl {
            position: absolute;
            font-size: clamp(3rem, 15vw, 5rem); /* Tamanho responsivo */
            pointer-events: none;
            animation: swim-across 12s infinite linear;
            top: 20%;
            left: -55%;
            will-change: transform, left;
        }

        @keyframes swim-across {
            0% { left: -220px; transform: scaleX(1) translateY(0); }
            25% { transform: translateY(-30px) rotate(-5deg); }
            50% { transform: translateY(-30px) rotate(-5deg); }
            75% { transform: translateY(-30px) rotate(-5deg); }
            100% { transform: scaleX(1) translateY(1); }
        }

        /* Botões Mobile-First */
        .btn-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn-round {
            width: 60px;
            height: 60px;
            background: #ff4081;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            box-shadow: 0 4px 12px rgba(255, 64, 129, 0.4);
            cursor: pointer;
            border: none;
        }

        .btn-label {
            color: #d81b60;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .shipwreck {
            position: absolute;
            font-size: 7rem;
            opacity: 0.15;
            bottom: 2%;
            left: 5%;
            transform: rotate(-10deg);
            z-index: 1;
        }

        /* Bolhas */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: rise 8s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(105vh) scale(0.3); opacity: 0; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="diver-area">
        <div class="diver-girl">
            <img src="./public/mergulhadora.png" alt="Diver">
        </div>
    </div>

    <div id="bubbles-container"></div>

    <div class="mobile-canvas animate__animated animate__fadeIn">
        
        <div class="shipwreck">🚢</div>

        <header class="text-center z-20">
            <div class="text-5xl mb-1">🐚</div>
            <h1 class="text-5xl font-bold text-pink-500" style="text-shadow: 2px 2px 0 white;">Aryella</h1>
            <p class="text-pink-400 font-bold text-lg">Faz 1 Aninho</p>
        </header>

        <div class="absolute" style="top: 25%; right: 5%; font-size: 2.5rem; animation: pulse 3s infinite;">🐠</div>
        <div class="absolute" style="bottom: 15%; left: 5%; font-size: 3.5rem; animation: bounce 4s infinite;">🐙</div>

        <nav class="btn-container z-30">
            <button onclick="openModal('video')" class="flex flex-col items-center">
                <div class="btn-round">▶</div>
                <span class="btn-label">Vídeo da Aryella</span>
            </button>

            <button onclick="openModal('confirmar')" class="flex flex-col items-center">
                <div class="btn-round">💬</div>
                <span class="btn-label">Confirmar Presença</span>
            </button>

            <button onclick="openModal('presentes')" class="flex flex-col items-center">
                <div class="btn-round">🎁</div>
                <span class="btn-label">Dicas de Presente</span>
            </button>

            <button onclick="openMap()" class="flex flex-col items-center">
                <div class="btn-round">📍</div>
                <span class="btn-label">Localização</span>
            </button>
        </nav>

        <footer class="z-20 w-11/12 max-w-xs">
            <div class="bg-white/60 backdrop-blur-sm p-4 rounded-3xl border border-white text-center shadow-sm">
                <p class="text-pink-600 font-bold">19/04/2026 • 16:00h</p>
                <p class="text-[10px] text-pink-400 uppercase tracking-tighter font-bold">Mergulhe com a gente nesta festa!</p>
            </div>
        </footer>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-blue-900/30 backdrop-blur-md z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-xs text-center relative animate__animated animate__zoomIn border-2 border-pink-100">
            <button onclick="closeModal()" class="absolute -top-3 -right-3 bg-pink-500 text-white w-10 h-10 rounded-full shadow-lg font-bold">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES
        const WHATSAPP_NUMERO = "5585985167028"; 
        const LINK_GOOGLE_MAPS = "COLOQUE_SEU_LINK_DO_MAPS_AQUI"; // Substitua pelo link do seu endereço

        // Gerador de Bolhas Responsivo
        function createBubbles() {
            const container = document.getElementById('bubbles-container');
            const count = window.innerWidth < 500 ? 12 : 20;
            for (let i = 0; i < count; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                const s = Math.random() * 15 + 5 + 'px';
                b.style.width = b.style.height = s;
                b.style.left = Math.random() * 100 + 'vw';
                b.style.animationDuration = (Math.random() * 4 + 4) + 's';
                b.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(b);
            }
        }
        createBubbles();

        function openModal(tipo) {
            const content = document.getElementById('modal-content');
            if(tipo === 'video') {content.innerHTML =
                `<h3 class="font-bold text-pink-500 mb-4">Mergulho da Aryella</h3><div class="aspect-video bg-gray-100 rounded-xl flex items-center justify-center text-xs text-gray-400">
                    <a href="https://www.canva.com/design/DAHDd7DHLC0/KvIMp8kkA13mt8H8Kix9Lg/watch?utm_content=DAHDd7DHLC0&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=h948f190db8" target="_blank" class="text-pink-500 font-bold">Clique aqui para assistir o vídeo!</a>
                </div>`;
            } else if(tipo === 'confirmar') {
                content.innerHTML = `<h3 class="font-bold text-pink-500 mb-4">Confirmar</h3><input id="nome" type="text" placeholder="Seu nome" class="w-full p-4 border rounded-2xl mb-3 outline-none focus:border-pink-300"><button onclick="enviarWA()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg">Confirmar no WhatsApp</button>`;
            } else {
                content.innerHTML = `<h3 class="font-bold text-pink-500 mb-4">Mimos</h3><p class="text-sm text-gray-600 leading-relaxed">Fraldas G, roupinhas tamanho 1 ou brinquedos educativos! Sua presença é o maior presente. ✨</p>`;
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function enviarWA() {
            const nome = document.getElementById('nome').value;
            if(!nome) return alert("Por favor, digite seu nome.");
            window.open(`https://wa.me/${WHATSAPP_NUMERO}?text=Olá! Confirmo minha presença no aniversário da Aryella! Nome: ${nome}`);
        }

        function openMap() { window.open("https://maps.app.goo.gl/19ALWbMKYZ8A4YqV7", "_blank"); }
    </script>
</body>
</html>
